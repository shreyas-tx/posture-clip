<svg viewBox="0 0 780 400" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Mono','Courier New',monospace">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,10 L5,0 L10,10 Z" fill="#1a1a1a"/>
    </marker>
    <marker id="arr-dim" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M0,10 L5,0 L10,10 Z" fill="#c8c4bc"/>
    </marker>
    <marker id="arr-meas" viewBox="0 0 10 10" refX="5" refY="0" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L5,10 L10,0 Z" fill="#c8c4bc"/>
    </marker>
  </defs>

  <rect width="780" height="400" fill="#f0ede6"/>

  <!-- ═══ LEFT PANEL: Anatomical placement ═══ -->
  <!-- Panel border -->
  <rect x="0" y="0" width="360" height="400" fill="#f0ede6"/>
  <line x1="360" y1="0" x2="360" y2="400" stroke="#c8c4bc" stroke-width="1"/>

  <text x="180" y="26" text-anchor="middle" font-size="9" fill="#666" letter-spacing="1" font-weight="500">SENSOR PLACEMENT — THORACIC SPINE</text>

  <!-- Head -->
  <ellipse cx="165" cy="52" rx="22" ry="20" fill="none" stroke="#c8c4bc" stroke-width="1.2"/>

  <!-- Neck -->
  <rect x="159" y="72" width="12" height="14" fill="#e8e5dd" stroke="#c8c4bc" stroke-width="1"/>

  <!-- Thoracic vertebrae T1–T12 (spine center x=165, each 28×11, spaced 15px) -->
  <!-- T1 y=88 -->
  <rect x="151" y="88" width="28" height="11" rx="1" fill="#e8e5dd" stroke="#c8c4bc" stroke-width="1"/>
  <text x="146" y="97" text-anchor="end" font-size="8.5" fill="#999">T1</text>

  <!-- T2 y=103 — highlighted, IMU 1 -->
  <rect x="149" y="103" width="32" height="12" rx="1" fill="#c8c4bc" stroke="#1a1a1a" stroke-width="1.2"/>
  <text x="146" y="113" text-anchor="end" font-size="8.5" fill="#1a1a1a" font-weight="500">T2</text>

  <!-- T3 -->
  <rect x="151" y="118" width="28" height="11" rx="1" fill="#e8e5dd" stroke="#c8c4bc" stroke-width="1"/>
  <!-- T4 -->
  <rect x="151" y="132" width="28" height="11" rx="1" fill="#e8e5dd" stroke="#c8c4bc" stroke-width="1"/>
  <!-- T5 -->
  <rect x="151" y="146" width="28" height="11" rx="1" fill="#e8e5dd" stroke="#c8c4bc" stroke-width="1"/>

  <!-- T6 y=160 — highlighted, IMU 2 -->
  <rect x="149" y="160" width="32" height="12" rx="1" fill="#c8c4bc" stroke="#1a1a1a" stroke-width="1.2"/>
  <text x="146" y="170" text-anchor="end" font-size="8.5" fill="#1a1a1a" font-weight="500">T6</text>

  <!-- T7–T12 -->
  <rect x="151" y="175" width="28" height="11" rx="1" fill="#e8e5dd" stroke="#c8c4bc" stroke-width="1"/>
  <rect x="151" y="189" width="28" height="11" rx="1" fill="#e8e5dd" stroke="#c8c4bc" stroke-width="1"/>
  <rect x="151" y="203" width="28" height="11" rx="1" fill="#e8e5dd" stroke="#c8c4bc" stroke-width="1"/>
  <rect x="151" y="217" width="28" height="11" rx="1" fill="#e8e5dd" stroke="#c8c4bc" stroke-width="1"/>
  <rect x="151" y="231" width="28" height="11" rx="1" fill="#e8e5dd" stroke="#c8c4bc" stroke-width="1"/>
  <rect x="151" y="245" width="28" height="11" rx="1" fill="#e8e5dd" stroke="#c8c4bc" stroke-width="1"/>

  <!-- Lumbar L1–L5 (slightly wider) -->
  <rect x="149" y="261" width="32" height="11" rx="1" fill="#e8e5dd" stroke="#c8c4bc" stroke-width="1"/>
  <rect x="149" y="275" width="32" height="11" rx="1" fill="#e8e5dd" stroke="#c8c4bc" stroke-width="1"/>
  <rect x="149" y="289" width="32" height="11" rx="1" fill="#e8e5dd" stroke="#c8c4bc" stroke-width="1"/>

  <!-- ── IMU 1 clip at T2 ── -->
  <!-- Connector line -->
  <line x1="181" y1="109" x2="210" y2="109" stroke="#1a1a1a" stroke-width="1.2"/>
  <!-- IMU chip block -->
  <rect x="210" y="97" width="90" height="24" rx="2" fill="#1a1a1a"/>
  <text x="255" y="112" text-anchor="middle" font-size="10" fill="#f0ede6" font-weight="500">IMU 1</text>
  <!-- Label below -->
  <text x="255" y="130" text-anchor="middle" font-size="9" fill="#666">reference</text>

  <!-- ── IMU 2 clip at T6 ── -->
  <line x1="181" y1="166" x2="210" y2="166" stroke="#1a1a1a" stroke-width="1.2"/>
  <rect x="210" y="154" width="90" height="24" rx="2" fill="#1a1a1a"/>
  <text x="255" y="169" text-anchor="middle" font-size="10" fill="#f0ede6" font-weight="500">IMU 2</text>
  <text x="255" y="187" text-anchor="middle" font-size="9" fill="#666">measurement</text>

  <!-- 65 mm spacing annotation -->
  <!-- Vertical double-headed arrow from y=109 to y=166 at x=316 -->
  <line x1="316" y1="109" x2="316" y2="166" stroke="#c8c4bc" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- Tick marks -->
  <line x1="310" y1="109" x2="322" y2="109" stroke="#c8c4bc" stroke-width="1"/>
  <line x1="310" y1="166" x2="322" y2="166" stroke="#c8c4bc" stroke-width="1"/>
  <text x="330" y="141" font-size="9" fill="#999">65 mm</text>

  <!-- Equation at bottom of left panel -->
  <rect x="16" y="330" width="328" height="52" rx="2" fill="#e8e5dd" stroke="#c8c4bc" stroke-width="1"/>
  <text x="180" y="352" text-anchor="middle" font-size="9" fill="#666" letter-spacing="0.5">CALIBRATED NEUTRAL (on startup)</text>
  <text x="180" y="372" text-anchor="middle" font-size="11" fill="#1a1a1a">θ_neutral = θ_IMU2 − θ_IMU1</text>

  <!-- ═══ RIGHT PANEL: θ_differential scenarios ═══ -->
  <text x="570" y="26" text-anchor="middle" font-size="9" fill="#666" letter-spacing="1" font-weight="500">θ_DIFFERENTIAL — WHY IT WORKS</text>

  <!-- Divider between scenarios (horizontal) -->
  <line x1="370" y1="205" x2="775" y2="205" stroke="#c8c4bc" stroke-width="1"/>

  <!-- ── Scenario A: Body Lean (top, y 40–200) ── -->
  <text x="570" y="50" text-anchor="middle" font-size="9" fill="#666" letter-spacing="1">BODY LEAN / REACH FORWARD</text>

  <!-- Spine segment center x=530 -->
  <line x1="490" y1="90" x2="490" y2="180" stroke="#c8c4bc" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- IMU 1 box (center y=90) -->
  <rect x="460" y="78" width="60" height="20" rx="2" fill="#e8e5dd" stroke="#1a1a1a" stroke-width="1"/>
  <text x="490" y="92" text-anchor="middle" font-size="9" fill="#1a1a1a">IMU 1</text>

  <!-- IMU 2 box (center y=180) -->
  <rect x="460" y="168" width="60" height="20" rx="2" fill="#e8e5dd" stroke="#1a1a1a" stroke-width="1"/>
  <text x="490" y="182" text-anchor="middle" font-size="9" fill="#1a1a1a">IMU 2</text>

  <!-- Both arrows tilted same direction (−15°) -->
  <!-- IMU1 arrow: base at (490,78), rotated −15° around (490,78) -->
  <g transform="rotate(-15, 490, 78)">
    <line x1="490" y1="78" x2="490" y2="42" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>
  </g>
  <!-- IMU2 arrow: same angle -->
  <g transform="rotate(-15, 490, 168)">
    <line x1="490" y1="168" x2="490" y2="132" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>
  </g>

  <!-- θ labels -->
  <text x="513" y="58" font-size="9" fill="#1a1a1a">θ₁ = 15°</text>
  <text x="513" y="148" font-size="9" fill="#1a1a1a">θ₂ = 15°</text>

  <!-- Result box -->
  <rect x="568" y="75" width="185" height="68" rx="2" fill="#e8e5dd" stroke="#c8c4bc" stroke-width="1"/>
  <text x="660" y="96" text-anchor="middle" font-size="9" fill="#666" letter-spacing="0.5">RESULT</text>
  <text x="660" y="114" text-anchor="middle" font-size="11" fill="#1a1a1a">Δθ = θ₂ − θ₁ = 0°</text>
  <text x="660" y="132" text-anchor="middle" font-size="10" fill="#1a1a1a" font-weight="500">NO ALERT ✓</text>

  <!-- Sub-note -->
  <text x="570" y="196" text-anchor="middle" font-size="8.5" fill="#999">single IMU would fire here — dual IMU doesn't</text>

  <!-- ── Scenario B: Slouch (bottom, y 215–395) ── -->
  <text x="570" y="226" text-anchor="middle" font-size="9" fill="#666" letter-spacing="1">THORACIC SLOUCH</text>

  <!-- Spine segment (curved — quadratic bezier bowing forward/left) -->
  <path d="M490,268 Q475,313 490,358" fill="none" stroke="#c8c4bc" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- IMU 1 box (center y=268) -->
  <rect x="460" y="256" width="60" height="20" rx="2" fill="#e8e5dd" stroke="#1a1a1a" stroke-width="1"/>
  <text x="490" y="270" text-anchor="middle" font-size="9" fill="#1a1a1a">IMU 1</text>

  <!-- IMU 2 box (center y=358) -->
  <rect x="460" y="346" width="60" height="20" rx="2" fill="#e8e5dd" stroke="#1a1a1a" stroke-width="1"/>
  <text x="490" y="360" text-anchor="middle" font-size="9" fill="#1a1a1a">IMU 2</text>

  <!-- IMU1 arrow: slight tilt −5° -->
  <g transform="rotate(-5, 490, 256)">
    <line x1="490" y1="256" x2="490" y2="220" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>
  </g>
  <!-- IMU2 arrow: larger tilt −25° -->
  <g transform="rotate(-25, 490, 346)">
    <line x1="490" y1="346" x2="490" y2="310" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>
  </g>

  <!-- θ labels -->
  <text x="513" y="238" font-size="9" fill="#1a1a1a">θ₁ = 5°</text>
  <text x="513" y="328" font-size="9" fill="#1a1a1a">θ₂ = 25°</text>

  <!-- Arc showing the difference angle (between the two arrows, at IMU2) -->
  <!-- Approximate small arc near IMU2 -->
  <path d="M490,322 A18,18 0 0,0 475,315" fill="none" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="455" y="313" font-size="8" fill="#1a1a1a">Δθ</text>

  <!-- Result box -->
  <rect x="568" y="265" width="185" height="80" rx="2" fill="#e8e5dd" stroke="#1a1a1a" stroke-width="1.2"/>
  <text x="660" y="286" text-anchor="middle" font-size="9" fill="#666" letter-spacing="0.5">RESULT</text>
  <text x="660" y="304" text-anchor="middle" font-size="11" fill="#1a1a1a">Δθ = 25° − 5° = 20°</text>
  <text x="660" y="320" text-anchor="middle" font-size="9" fill="#1a1a1a">&gt; 15–20% of θ_neutral</text>
  <text x="660" y="337" text-anchor="middle" font-size="10" fill="#1a1a1a" font-weight="500">HAPTIC ALERT ∿∿</text>

  <!-- Sub-note -->
  <text x="570" y="388" text-anchor="middle" font-size="8.5" fill="#999">T2–T6 curvature detects slouch independent of overall body lean</text>
</svg>
